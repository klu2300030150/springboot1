spring:
  application:
    name: backend-assignment
  datasource:
    url: jdbc:postgresql://localhost:5432/guardrails
    username: guardrails
    password: guardrails
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: info
